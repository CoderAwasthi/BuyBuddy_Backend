spring:
  application:
    name: price-drop-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/pricedrop-dev?connectTimeoutMS=10000&socketTimeoutMS=30000&serverSelectionTimeoutMS=10000&maxPoolSize=50

affiliate:
  tag: keertiawast00-21

app:
  scheduler:
    enabled: false    # Disabled by default - enable with caution
    interval: 600000   # 10 minutes in dev to reduce CAPTCHA pressure
  scraping:
    max-concurrency: 1
    request-delay-ms: 2000
    max-retries: 1
    captcha-cooldown-minutes: 20
  env: dev